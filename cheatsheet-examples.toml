[[section]]
title = "Notes"
examples = [
  { kind = "note", description = "Quarter note",     syntax = "1"   },
  { kind = "note", description = "Rest",             syntax = "0"   },
  { kind = "note", description = "Eighth note",      syntax = "1_"  },
  { kind = "note", description = "Sixteenth note",   syntax = "1="  },
  { kind = "note", description = "Dotted note",      syntax = "1."  },
  { kind = "note", description = "Dotted eighth",    syntax = "1_." },
  { kind = "note", description = "Octave up",        syntax = "1'"  },
  { kind = "note", description = "Two octaves up",   syntax = "1''" },
  { kind = "note", description = "Octave down",      syntax = "1,"  },
  { kind = "note", description = "Two octaves down", syntax = "1,," },
  { kind = "note", description = "Extension",        syntax = "1 -" },
]

[[section]]
title = "Chords"
examples = [
  { kind = "chord", description = "Major",           syntax = "1"    },
  { kind = "chord", description = "Minor",           syntax = "1m"   },
  { kind = "chord", description = "Dominant 7th",    syntax = "17"   },
  { kind = "chord", description = "Major 7th",       syntax = "1M7"  },
  { kind = "chord", description = "Minor 7th",       syntax = "1m7"  },
  { kind = "chord", description = "Sharp",           syntax = "1#"   },
  { kind = "chord", description = "Sharp minor 7th", syntax = "1#m7" },
  { kind = "chord", description = "Flat",            syntax = "3b"   },
  { kind = "chord", description = "Slash bass",      syntax = "1/5"  },
]

[[section]]
title = "Groups"
examples = [
  { kind = "line", description = "Slur",        syntax = "(1 2)",       notes_line = "(1 2) 0 0"       },
  { kind = "line", description = "Nested slur", syntax = "(3= (2_1_))", notes_line = "(3= (2_1_)) 0_" },
]

[[section]]
title = "Directives"

[[section.examples]]
kind = "score"
description = "BPM / key / time"
syntax = "bpm=120 key=C4 time=4/4"
source = """
[parts]
main = notes

[score]
(bpm=120 key=C4 time=4/4)
1 0 0 0"""

[[section.examples]]
kind = "score"
description = "Section label"
syntax = 'label="Verse 1"'
source = """
[parts]
main = notes

[score]
(label="Verse 1")
1 0 0 0"""

[[section.examples]]
kind = "line"
description = "Inline key change"
syntax = "1=C4"
notes_line = "1=C4 1 2 3"

[[section.examples]]
kind = "line"
description = "Inline time change"
syntax = "3/4"
notes_line = "3/4 1 2 3"

[[section.examples]]
kind = "line"
description = "Inline BPM change"
syntax = "bpm=92"
notes_line = "bpm=92 1 2 3 4"

[[section]]
title = "Lyrics"

[[section.examples]]
kind = "score"
description = "Notes + lyrics"
syntax = "do re mi fa"
source = """
[parts]
Melody = notes lyrics

[score]
1 2 3 4
do re mi fa"""

[[section.examples]]
kind = "score"
description = "Held syllable"
syntax = "你 -"
source = """
[parts]
Melody = notes lyrics

[score]
1 - 3 0
你 - 好"""

[[section.examples]]
kind = "score"
description = "No-lyrics marker"
syntax = "_"
source = """
[parts]
Melody = notes lyrics

[score]
1 2 3 4
do re mi fa

1 2 3 4
_"""

[[section]]
title = "Ditto"

[[section.examples]]
kind = "score"
description = "Ditto line"
syntax = '"'
source = """
[parts]
Melody = notes

[score]
1 2 3 4

\""""
