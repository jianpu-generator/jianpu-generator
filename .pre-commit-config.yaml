repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-case-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^web/
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-shebang-scripts-are-executable
        exclude: \.rs$

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        pass_filenames: false
      - id: biome-check
        name: biome check
        entry: bash -c 'cd web && pnpm exec biome check .'
        language: system
        files: ^web/
        pass_filenames: false
